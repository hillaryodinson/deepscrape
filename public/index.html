<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deepscrape Finance</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      color: white;
      background: radial-gradient(circle at 20% 30%, #111 0%, #000 60%);
    }

    /* --- NAVBAR --- */
    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      z-index: 10;
    }

    .logo {
      font-weight: 600;
      font-size: 18px;
      letter-spacing: 0.5px;
    }

    .nav-links {
      display: flex;
      gap: 30px;
      font-size: 14px;
      color: #aaa;
    }

    .nav-links a {
      text-decoration: none;
      color: inherit;
      transition: color 0.3s ease;
    }

    .nav-links a:hover {
      color: white;
    }

    .cta {
      padding: 10px 18px;
      border-radius: 999px;
      background: white;
      color: black;
      font-size: 14px;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .cta:hover {
      background: #ddd;
    }

    /* --- HERO --- */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 20px;
    }

    .hero-content {
      max-width: 800px;
      animation: fadeIn 1.2s ease forwards;
      opacity: 0;
    }

    h1 {
      font-size: 48px;
      font-weight: 600;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    p {
      font-size: 18px;
      color: #aaa;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .btn-primary {
      padding: 14px 28px;
      border-radius: 999px;
      background: white;
      color: black;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      background: #ddd;
      transform: translateY(-2px);
    }

    .btn-secondary {
      padding: 14px 28px;
      border-radius: 999px;
      border: 1px solid #444;
      color: white;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      border-color: white;
      transform: translateY(-2px);
    }

    /* --- BACKGROUND GLOW --- */
    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,255,255,0.05), transparent 70%);
      filter: blur(80px);
      animation: moveGlow 12s infinite alternate ease-in-out;
    }

    .glow.one {
      top: -100px;
      left: -100px;
    }

    .glow.two {
      bottom: -100px;
      right: -100px;
    }

    /* --- ANIMATIONS --- */
    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
      from {
        opacity: 0;
        transform: translateY(20px);
      }
    }

    @keyframes moveGlow {
      from {
        transform: translate(0, 0);
      }
      to {
        transform: translate(50px, 50px);
      }
    }

    /* --- RESPONSIVE --- */
    @media (max-width: 768px) {
      h1 {
        font-size: 32px;
      }

      .nav-links {
        display: none;
      }

      .buttons {
        flex-direction: column;
      }
    }

  </style>
</head>

<body>

  <!-- Background Glow -->
  <div class="glow one"></div>
  <div class="glow two"></div>

  <!-- NAV -->
  <div class="nav">
    <div class="logo">Deepscrape Finance</div>

    <div class="nav-links">
      <a href="/docs">Docs</a>
      <a href="/news">API</a>
      <a href="#">Guides</a>
      <a href="#">Pricing</a>
    </div>

    <a href="/docs" class="cta">Get Started</a>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-content">
      <h1>Build Faster with Powerful Financial Data</h1>
      <p>
        Real-time market news and insights delivered through a clean, developer-first API.
      </p>

      <div class="buttons">
        <a href="/docs" class="btn-primary">Start Building</a>
        <a href="/docs" class="btn-secondary">View Docs</a>
      </div>
    </div>
  </div>

</body>
</html>
